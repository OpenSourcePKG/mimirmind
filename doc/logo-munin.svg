  <!-- Chest sigil: sealed ring — "kept memory / vault" -->
  <g>
    <circle cx="108" cy="130" r="7" fill="none" stroke="#06091A" stroke-width="2"/>
    <circle cx="108" cy="130" r="2.2" fill="#06091A"/>
  </g>
</svg>