# docker-compose.server.yml — Dev-Test gegen ein vorab gebautes Image.
#
# Im Gegensatz zu docker-compose.yml wird hier nichts lokal gebaut; das
# Image kommt aus ${MIMIRMIND_IMAGE:-mimirmind:latest}. Setze
# MIMIRMIND_IMAGE, wenn Du aus einer eigenen Registry ziehen willst
# (z.B. `your-registry.example/mimirmind:sha-abcd123`). Logs landen
# sowohl auf stdout (via tty) als auch in ./run-logs/run.log auf dem
# Host (der Log-Path steht in der config.json unter server.log.file).
#
# Voraussetzungen:
#   - GGUFs liegen unter ${MIMIRMIND_MODELS_DIR} (default: ./models)
#   - Intel iGPU/dGPU unter /dev/dri verfügbar
#   - Host-config unter ${MIMIRMIND_CONFIG_HOST} (default ./config.json)
#     — Copy-Vorlage: `cp config.example.json config.json` und für den
#     Host tunen. Enthält alle Runtime-, Feature-, Governor-, Thermal-
#     und Diagnostics-Knöpfe (was früher MIMIRMIND_*-env-Vars waren).
#   - LXC-Layer reicht /sys/devices/virtual/powercap durch (für RAPL),
#     wenn dieser Container in einem Proxmox-CT läuft:
#       lxc.mount.entry: /sys/devices/virtual/powercap sys/devices/virtual/powercap none bind,ro,create=dir 0 0
#
# Gemeinsame Env-Variablen (Compose-Steuerung, NICHT Runtime-Knöpfe):
#
#   export MIMIRMIND_MODELS_DIR=/srv/llm-models
#   export MIMIRMIND_CONFIG_HOST=/etc/mimirmind/config.json
#   export MIMIRMIND_RENDER_GID=$(getent group render | cut -d: -f3)
#   export MIMIRMIND_VIDEO_GID=$(getent group video  | cut -d: -f3)
#   export MIMIRMIND_PORT=8080
#
# Standard-Command in diesem File ist `serve` (Production-Pfad). Smoke
# muss man explizit anstoßen — siehe unten.
#
# ── Serve-Workflow (M7d/M7e OpenAI HTTP-API) ──────────────────────────────
#
#   docker compose -f docker-compose.server.yml up                  # foreground
#   docker compose -f docker-compose.server.yml up -d               # daemon
#
# Endpoints am Host auf Port ${MIMIRMIND_PORT:-8080}:
#   GET  /health
#   GET  /v1/models
#   POST /v1/chat/completions   (auch mit stream:true)
#
#   curl -N http://localhost:8080/v1/chat/completions \
#     -H 'Content-Type: application/json' \
#     -d '{"messages":[{"role":"user","content":"Hi!"}],"stream":true}'
#
# ── Smoke-Workflow (M1-M5 Diagnostics + ein 20-Token-Generate) ────────────
#
# Smoke überschreibt das default-`command` durch Argv hinter dem Service-Namen:
#
#   docker compose -f docker-compose.server.yml pull
#   rm -f ./run-logs/run.log                                    # frischer Log
#   docker compose -f docker-compose.server.yml run --rm mimirmind smoke 2>&1 \
#       | tee ./run-logs/stdout.log
#
# Mit Chat-Template (M7c) und/oder Sampling (M7b):
#
#   docker compose -f docker-compose.server.yml run --rm mimirmind \
#       smoke --chat --prompt "Wer hat den Mond entdeckt?"
#   docker compose -f docker-compose.server.yml run --rm mimirmind \
#       smoke --temperature 0.8 --top-p 0.95 --seed 42
#
# Logs in ./run-logs/run.log (strukturierter MM_LOG, Pfad aus config.json).
#
# ── Migration hinweis (vor 2026-07-10) ────────────────────────────────────
#
# Bis Commit 99924d3 lebten die Runtime-Knöpfe als MIMIRMIND_*-env-Vars
# hier im environment: Block. Diese sind ersatzlos gestrichen — der
# Ersatz ist config.json. Mapping-Tabelle:
#
#   MIMIRMIND_MODEL_PATH             → models[<defaultModel>].path
#   MIMIRMIND_LOG_LEVEL / _FILE      → server.log.level / server.log.file
#   MIMIRMIND_MAX_CONTEXT_TOKENS     → runtime.maxContextTokens
#   MIMIRMIND_KV_DTYPE               → runtime.kvDtype
#   MIMIRMIND_USM_PROBE_TOTAL_GIB    → runtime.usmProbeTotalGib
#   MIMIRMIND_PRESERVE_THINKING      → runtime.preserveThinking
#   MIMIRMIND_SPV_DIR                → runtime.spvDir
#   MIMIRMIND_ENABLE_CLR             → features.clr
#   MIMIRMIND_DISABLE_FLASH_PREFILL  → features.flashPrefill: false
#   MIMIRMIND_DISABLE_FUSED_QKV      → features.fusedQkv: false
#   MIMIRMIND_DISABLE_MOE_GROUP      → features.moeGroup: false
#   MIMIRMIND_DISABLE_GEMM           → features.gemm: "disable"
#   MIMIRMIND_FORCE_GEMM             → features.gemm: "force"
#   MIMIRMIND_GEMM_MIN_M             → features.gemmMinM
#   MIMIRMIND_USE_GEMM_V2            → features.gemmV2
#   MIMIRMIND_DISABLE_DP4A           → features.dp4a: "disable"
#   MIMIRMIND_FORCE_DP4A             → features.dp4a: "force"
#   MIMIRMIND_SPEC_DEC / _N          → speculative.enabled / speculative.n
#   MIMIRMIND_DRAFT_MODEL_PATH       → models[].path mit id "draft"
#                                       + speculative.draft="draft"
#   MIMIRMIND_THERMAL_PROFILE        → governor.thermal (inline)
#   MIMIRMIND_GPU_CLOCK_PIN          → governor.gpuClockPin
#   MIMIRMIND_GOVERNOR_TICK_LOG      → governor.tickLog + diagnostics.traceDecodeFile
#   MIMIRMIND_FAN_BOOST              → governor.fan.boost
#   MIMIRMIND_FAN_PWM_BOOST          → governor.fan.pwmBoost
#   MIMIRMIND_FAN_PWM_MIN            → governor.fan.pwmMin
#   MIMIRMIND_REGRESSION_ALERT       → diagnostics.regressionAlert
#   MIMIRMIND_TRACE_OP_TIMES         → diagnostics.traceOpTimes
#   MIMIRMIND_TRACE_BLOCK0           → diagnostics.traceBlock0
#   MIMIRMIND_TRACE_DECODE_FILE      → diagnostics.traceDecodeFile
#   MIMIRMIND_PARITY_DUMP            → diagnostics.parityDump

services:

    mimirmind:
        image: ${MIMIRMIND_IMAGE:-mimirmind:latest}
        container_name: mimirmind-devtest
        pull_policy: always

        # Default treibt den Serve-Modus, weil das der Production-Pfad ist.
        # Smoke startet man explizit per `compose run --rm mimirmind smoke ...`
        # — die Argv-Override hinter dem Service-Namen ersetzt dieses
        # `command`. Der Pfad `/etc/mimirmind/config.json` kommt aus dem
        # Bind-Mount weiter unten.
        command:
            - serve
            - --config
            - /etc/mimirmind/config.json

        devices:
            - /dev/dri:/dev/dri

        # GIDs müssen denen des Hosts entsprechen — sonst kein /dev/dri-
        # Zugriff. Default 104/44 sind Ubuntu/Debian; per env überschreiben.
        group_add:
            - "${MIMIRMIND_RENDER_GID:-104}"
            - "${MIMIRMIND_VIDEO_GID:-44}"

        # Hebt die Docker-Default-Maskierung von /sys/devices/virtual/powercap
        # auf, damit der Engine die Intel-RAPL-Energy-Counters lesen kann.
        # Ohne das melden /v1/system/status und die per-request usage einfach
        # "power unavailable". Platypus-Side-Channel ist für eine LLM-
        # Inferenz-Workload nicht relevant.
        security_opt:
            - systempaths=unconfined

        # M7d/M7e — OpenAI-compatible HTTP API. Host-Port via
        # MIMIRMIND_PORT env, Container-Port sollte config.json.server.port
        # entsprechen (default 8080).
        ports:
            - "${MIMIRMIND_PORT:-8080}:8080"

        environment:
            # Level Zero: 4-GiB-Cap aufheben (sonst sieht der Probe bei
            # 4 GiB einen ze_RESULT_ERROR_OUT_OF_DEVICE_MEMORY). Das sind
            # LZ-Loader-env-Vars, keine mimirmind-Runtime-Knöpfe.
            UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            UR_L0_USE_RELAXED_ALLOCATION_LIMITS:    "1"

        volumes:
            - ${MIMIRMIND_MODELS_DIR:-./models}:/models:ro
            - ./run-logs:/logs:rw
            # Perf-regression detector's rolling baseline. Persists
            # across container restarts so the trailing-7d p50 does not
            # rebuild from scratch every deploy. Without this mount the
            # detector logs a "cannot open" warning on the first run and
            # keeps running (in-memory only) — inference is unaffected,
            # but a regression won't be catchable until enough runs have
            # accumulated in the fresh container.
            - ${MIMIRMIND_STATE_DIR:-./run-state}:/root/.cache/mimirmind:rw
            # config.json — Single Source of Truth für alle Runtime-,
            # Feature-, Governor- und Diagnostics-Knöpfe. Bind-Mount aus
            # ${MIMIRMIND_CONFIG_HOST}. Falls die Host-Datei nicht
            # existiert, weigert sich compose mit klarem "no such file".
            - ${MIMIRMIND_CONFIG_HOST:-./config.json}:/etc/mimirmind/config.json:ro
            # iGPU sysfs view (Symlinks für /sys/class/drm/cardN, rw für
            # den dynamischen GPU-Clock-Governor).
            - /sys/class/drm:/sys/class/drm:rw
            # Echtes Device-Verzeichnis hinter den Symlinks. Wir mounten
            # den /sys/devices-Tree ganz, weil der spezifische PCI-Pfad
            # (/sys/devices/pci0000:00/0000:00:02.0/drm) Doppelpunkte
            # enthält und ältere `docker compose`-Versionen das selbst in
            # der long-form als Short-Form-String an den Daemon
            # serialisieren — der dann an den Colons stolpert. /sys/devices
            # selbst ist colon-frei und parsed sauber.
            - /sys/devices:/sys/devices:rw

        restart: "no"
        stdin_open: true
        tty: true