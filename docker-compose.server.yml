# docker-compose.server.yml — Dev-Test gegen das gepushte Registry-Image.
#
# Im Gegensatz zu docker-compose.yml wird hier nichts lokal gebaut; das
# Image kommt aus mimirmind. Logs landen sowohl
# auf stdout (via tty) als auch in ./run-logs/run.log auf dem Host
# (über den /logs-Mount + MIMIRMIND_LOG_FILE).
#
# Voraussetzungen:
#   - GGUFs liegen unter ${MIMIRMIND_MODELS_DIR} (default: ./models)
#   - Intel iGPU/dGPU unter /dev/dri verfügbar
#   - Thermal-Profile-JSON unter ${MIMIRMIND_THERMAL_PROFILE_HOST}
#     (default ./thermal-profile.json) — siehe doc/operations.md
#   - LXC-Layer reicht /sys/devices/virtual/powercap durch (für RAPL),
#     wenn dieser Container in einem Proxmox-CT läuft:
#       lxc.mount.entry: /sys/devices/virtual/powercap sys/devices/virtual/powercap none bind,ro,create=dir 0 0
#
# Gemeinsame Env-Variablen (für beide Workflows unten):
#
#   export MIMIRMIND_MODELS_DIR=/srv/llm-models
#   export MIMIRMIND_MODEL_PATH=/models/Qwen2.5-7B-Instruct-Q4_K_M.gguf
#   export MIMIRMIND_RENDER_GID=$(getent group render | cut -d: -f3)
#   export MIMIRMIND_VIDEO_GID=$(getent group video  | cut -d: -f3)
#   export MIMIRMIND_THERMAL_PROFILE_HOST=/etc/mimirmind/thermal-nuc14.json
#
# Standard-Command in diesem File ist `serve` (Production-Pfad). Smoke
# muss man explizit anstoßen — siehe unten.
#
# ── Serve-Workflow (M7d/M7e OpenAI HTTP-API) ──────────────────────────────
#
#   docker compose -f docker-compose.server.yml up                  # foreground
#   docker compose -f docker-compose.server.yml up -d               # daemon
#
# Endpoints am Host auf Port ${MIMIRMIND_PORT:-8080}:
#   GET  /health
#   GET  /v1/models
#   POST /v1/chat/completions   (auch mit stream:true)
#
#   curl -N http://localhost:8080/v1/chat/completions \
#     -H 'Content-Type: application/json' \
#     -d '{"messages":[{"role":"user","content":"Hi!"}],"stream":true}'
#
# ── Smoke-Workflow (M1-M5 Diagnostics + ein 20-Token-Generate) ────────────
#
# Smoke überschreibt das default-`command` durch Argv hinter dem Service-Namen:
#
#   docker compose -f docker-compose.server.yml pull
#   rm -f ./run-logs/run.log                                    # frischer Log
#   docker compose -f docker-compose.server.yml run --rm mimirmind smoke 2>&1 \
#       | tee ./run-logs/stdout.log
#
# Mit Chat-Template (M7c) und/oder Sampling (M7b):
#
#   docker compose -f docker-compose.server.yml run --rm mimirmind \
#       smoke --chat --prompt "Wer hat den Mond entdeckt?"
#   docker compose -f docker-compose.server.yml run --rm mimirmind \
#       smoke --temperature 0.8 --top-p 0.95 --seed 42
#
# Logs in ./run-logs/run.log (strukturierter MM_LOG).

services:

    mimirmind:
        image: mimirmind:${MIMIRMIND_IMAGE_TAG:-latest}
        container_name: mimirmind-devtest
        pull_policy: always

        # Default treibt den Serve-Modus, weil das der Production-Pfad ist.
        # Smoke startet man explizit per `compose run --rm mimirmind smoke ...`
        # — die Argv-Override hinter dem Service-Namen ersetzt dieses
        # `command`.
        command:
            - serve
            - --port
            - "8080"

        devices:
            - /dev/dri:/dev/dri

        # GIDs müssen denen des Hosts entsprechen — sonst kein /dev/dri-
        # Zugriff. Default 104/44 sind Ubuntu/Debian; per env überschreiben.
        group_add:
            - "${MIMIRMIND_RENDER_GID:-104}"
            - "${MIMIRMIND_VIDEO_GID:-44}"

        # Hebt die Docker-Default-Maskierung von /sys/devices/virtual/powercap
        # auf, damit der Engine die Intel-RAPL-Energy-Counters lesen kann.
        # Ohne das melden /v1/system/status und die per-request usage einfach
        # "power unavailable". Platypus-Side-Channel ist für eine LLM-
        # Inferenz-Workload nicht relevant.
        security_opt:
            - systempaths=unconfined

        # M7d/M7e — OpenAI-compatible HTTP API. Host-Port via
        # MIMIRMIND_PORT env, Container-Port ist fest 8080 (siehe `command`).
        ports:
            - "${MIMIRMIND_PORT:-8080}:8080"

        environment:
            # Level Zero: 4-GiB-Cap aufheben (sonst sieht der Probe bei
            # 4 GiB einen ze_RESULT_ERROR_OUT_OF_DEVICE_MEMORY).
            UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            UR_L0_USE_RELAXED_ALLOCATION_LIMITS:    "1"

            # Default info — trace ist für gezielte Smoke-Runs nützlich
            # aber spammt im Serve-Modus die run.log voll.
            MIMIRMIND_LOG_LEVEL:  ${MIMIRMIND_LOG_LEVEL:-info}
            MIMIRMIND_LOG_FILE:   ${MIMIRMIND_LOG_FILE:-/logs/run.log}

            # Phase 2 USM probe cap in GiB. Default 4, set 0 to skip.
            # Phase 2 holds *all* the probed memory simultaneously, so on UMA
            # systems this directly translates to host-RAM usage during probe.
            MIMIRMIND_USM_PROBE_TOTAL_GIB: ${MIMIRMIND_USM_PROBE_TOTAL_GIB:-4}

            # Pflicht: ohne kein M3-Load. `?` lässt compose früh failen.
            MIMIRMIND_MODEL_PATH: ${MIMIRMIND_MODEL_PATH:?set MIMIRMIND_MODEL_PATH=/models/<file>.gguf}

            # Thermal-Profile-Pfad im Container. Bind-mounted aus
            # ${MIMIRMIND_THERMAL_PROFILE_HOST}. Falls die Host-Datei nicht
            # existiert, weigert sich compose mit klarem "no such file".
            MIMIRMIND_THERMAL_PROFILE: /etc/mimirmind/thermal-profile.json

        volumes:
            - ${MIMIRMIND_MODELS_DIR:-./models}:/models:ro
            - ./run-logs:/logs:rw
            - ${MIMIRMIND_THERMAL_PROFILE_HOST:-./thermal-profile.json}:/etc/mimirmind/thermal-profile.json:ro
            # iGPU sysfs view (Symlinks für /sys/class/drm/cardN, rw für
            # den dynamischen GPU-Clock-Governor).
            - /sys/class/drm:/sys/class/drm:rw
            # Echtes Device-Verzeichnis hinter den Symlinks. Wir mounten
            # den /sys/devices-Tree ganz, weil der spezifische PCI-Pfad
            # (/sys/devices/pci0000:00/0000:00:02.0/drm) Doppelpunkte
            # enthält und ältere `docker compose`-Versionen das selbst in
            # der long-form als Short-Form-String an den Daemon
            # serialisieren — der dann an den Colons stolpert. /sys/devices
            # selbst ist colon-frei und parsed sauber.
            - /sys/devices:/sys/devices:rw

        restart: "no"
        stdin_open: true
        tty: true