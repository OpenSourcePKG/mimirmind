# M-Munin USM-alloc-kind bench override — pin to Shared.
#
# Layered on top of docker-compose.server.yml for the baseline half
# of the perf-comparison run. Shared is the current compiled
# default, so this override only exists to make the bench log line
# unambiguous ("MIMIRMIND_USM_KIND='shared' — bench override picks
# shared") when running back-to-back against docker-compose.usm-host.yml.
#
# Usage:
#   docker compose -f docker-compose.server.yml -f docker-compose.usm-shared.yml \
#       up -d --force-recreate mimirmind

services:
    mimirmind:
        environment:
            MIMIRMIND_USM_KIND: shared