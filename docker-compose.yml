# MimirMind — Docker-only dev + runtime.
#
# Goal: the developer machine stays free of Intel SDK packages. All build
# and run happens inside containers; only the source lives on the host.
#
# Workflows
# ---------
#
#   # Build the binary (toolchain in container, source from host, artefacts
#   # written into ./build on the host):
#   docker compose run --rm builder
#
#   # Interactive shell in the build toolchain:
#   docker compose run --rm builder bash
#
#   # Build the runtime image (multi-stage, fully reproducible, no host
#   # ./build needed):
#   docker compose build mimirmind
#
#   # Run the M1 smoke test out of the runtime image:
#   docker compose run --rm mimirmind
#
# The GPU pass-through (/dev/dri + group_add 44/104) is set on both
# services so the builder can also run a quick post-build verification
# against the local iGPU if one is present.

services:

    # ------------------------------------------------------------------
    # builder — toolchain image. Source is bind-mounted from host.
    #           Use this for iterative dev: edit source on host, rebuild
    #           in container, binary lands in ./build on host.
    # ------------------------------------------------------------------
    builder:
        build:
            context: .
            dockerfile: Dockerfile
            target: builder
        image: mimirmind:builder
        container_name: mimirmind-builder

        # iGPU access (optional for the builder — only needed if you want
        # to run the freshly built binary inside this same container).
        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "44"     # video
            - "104"   # render

        environment:
            UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            UR_L0_USE_RELAXED_ALLOCATION_LIMITS: "1"
            BUILD_TYPE: ${BUILD_TYPE:-Release}

        volumes:
            # Host source tree, read-write so cmake can populate ./build
            - ./:/src

        working_dir: /src

        # No restart — one-shot builds
        restart: "no"
        stdin_open: true
        tty: true

    # ------------------------------------------------------------------
    # mimirmind — runtime image. Binary baked in via multi-stage build.
    #             No source, no toolchain, ~250 MB image.
    # ------------------------------------------------------------------
    mimirmind:
        build:
            context: .
            dockerfile: Dockerfile
            target: runtime
        image: mimirmind:dev
        container_name: mimirmind

        devices:
            - /dev/dri:/dev/dri
        group_add:
            - "44"     # video
            - "104"   # render

        # Unmask the host sysfs subtree so /sys/devices/virtual/powercap
        # (Intel RAPL energy counters) is readable from inside the
        # container. Docker masks this by default as a Platypus-style
        # side-channel mitigation; mimirmind is a pure inference
        # workload with no crypto-key handling, so the side-channel
        # threat does not apply. Without this, /v1/system/status reports
        # power as "unavailable: docker sysfs masking" and per-request
        # energy is not measured.
        security_opt:
            - systempaths=unconfined

        environment:
            UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            UR_L0_USE_RELAXED_ALLOCATION_LIMITS: "1"

        # Runtime knobs live in config.json — copy config.example.json to
        # config.dev.json (gitignored) and edit for the dev iGPU. If the
        # host file is missing, compose fails with "no such file".
        # Models live on the host — read-only mount.
        # Symlink / bind ./models to wherever the GGUFs actually sit.
        volumes:
            - ./models:/models:ro
            - ${MIMIRMIND_CONFIG_HOST:-./config.dev.json}:/etc/mimirmind/config.json:ro

        command:
            - serve
            - --config
            - /etc/mimirmind/config.json

        # M7d — OpenAI-compatible HTTP API. Default container port is 8080;
        # remap on the host as needed.
        ports:
            - "8080:8080"

        restart: "no"
        stdin_open: true
        tty: true

    # ------------------------------------------------------------------
    # builder-cuda — NVIDIA CUDA toolchain, ARM64 target (DGX Spark).
    #                Peer to `builder` (Intel L0) and `builder-hip`
    #                (AMD ROCm). Host source bind-mounted; artefacts
    #                land in ./build-cuda on the host.
    # ------------------------------------------------------------------
    builder-cuda:
        build:
            context: .
            dockerfile: Dockerfile
            target: builder-cuda
            platforms:
                - linux/arm64
        image: mimirmind:builder-cuda
        container_name: mimirmind-builder-cuda

        # NVIDIA Container Runtime — cudart + nvcc need the driver
        # visible. Modern Docker exposes GPUs via `deploy.resources`;
        # older Docker versions need `runtime: nvidia` instead.
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]

        environment:
            BUILD_TYPE: ${BUILD_TYPE:-Release}

        volumes:
            - ./:/src

        working_dir: /src

        # Default /dev/shm is 64 MB, which silently fails anything
        # doing shared-memory (parity dumps, perf traces). Bumped to
        # 8g per the Spark engine-fit note.
        shm_size: 8g

        restart: "no"
        stdin_open: true
        tty: true

    # ------------------------------------------------------------------
    # mimirmind-cuda — runtime service for DGX Spark deploys. ARM64,
    #                  NVIDIA GPU passthrough via nvidia-container-runtime.
    # ------------------------------------------------------------------
    mimirmind-cuda:
        build:
            context: .
            dockerfile: Dockerfile
            target: runtime-cuda
            platforms:
                - linux/arm64
        image: mimirmind:dev-cuda
        container_name: mimirmind-cuda

        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]

        shm_size: 8g

        # Models + config bind-mount identical to the L0 `mimirmind`
        # service. ApiServer defaults to binding 0.0.0.0 (see
        # src/server/ApiServer.hpp line 41), so no --host override
        # needed in the command below.
        volumes:
            - ./models:/models:ro
            - ${MIMIRMIND_CONFIG_HOST:-./config.dev.json}:/etc/mimirmind/config.json:ro

        command:
            - serve
            - --config
            - /etc/mimirmind/config.json

        ports:
            - "8080:8080"

        restart: "no"
        stdin_open: true
        tty: true